<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <!-- Modern Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.8);
            --border-color: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-glow: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%);
            --btn-bg: #21262d;
            --btn-hover: #30363d;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(88, 166, 255, 0.06), transparent 450px),
                              radial-gradient(circle at bottom left, rgba(188, 140, 255, 0.06), transparent 450px);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            max-width: 650px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .main-card:hover {
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            border-color: #484f58;
        }

        h1 {
            font-weight: 800;
            background: var(--accent-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        h2.section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .form-label {
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .textarea-container {
            position: relative;
            margin-bottom: 25px;
        }

        #textToAnalyze {
            background-color: #161b22 !important;
            border: 1px solid var(--border-color);
            color: var(--text-primary) !important;
            border-radius: 12px;
            padding: 16px;
            font-size: 1.05rem;
            resize: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            height: 110px;
        }

        #textToAnalyze:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2);
            border-color: #58a6ff;
        }

        .btn-analyze {
            background: var(--accent-glow);
            border: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 14px 28px;
            border-radius: 12px;
            width: 100%;
            transition: all 0.25s ease;
            box-shadow: 0 4px 15px rgba(88, 166, 255, 0.25);
            cursor: pointer;
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 166, 255, 0.4);
            opacity: 0.95;
        }

        .btn-analyze:active {
            transform: translateY(1px);
        }

        .response-container {
            background-color: rgba(13, 17, 23, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
            min-height: 80px;
            transition: all 0.3s ease;
        }

        #system_response {
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-primary);
        }

        #system_response:empty::before {
            content: "System response will appear here...";
            color: var(--text-secondary);
            font-style: italic;
        }
    </style>
    <!-- Include client-side javascript -->
    <script src="{{ url_for('static', filename='mywebscript.js') }}"></script>
</head>
<body>
    <div class="main-card">
        <h1>Emotion Detector</h1>
        
        <!-- Input Section -->
        <div class="textarea-container">
            <h2 class="section-title">
                <label for="textToAnalyze" class="form-label">Please enter the text to be analyzed</label>
            </h2>
            <textarea class="form-control" id="textToAnalyze" placeholder="Type or paste your text here..."></textarea>
        </div>

        <!-- Trigger Button -->
        <div class="mb-4">
            <button onclick="RunSentimentAnalysis()" class="btn-analyze">Run Sentiment Analysis</button>
        </div>

        <!-- Output Section -->
        <div>
            <h2 class="section-title">Result of Emotion Detection</h2>
            <div class="response-container">
                <div id="system_response"></div>
            </div>
        </div>
    </div>
</body>
</html>
